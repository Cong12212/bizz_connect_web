name: Deploy Frontend

on:
  push:
    branches: [main, test]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (main or test)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Resolve environment config
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "api_url=https://api.biz-connect.online/api"    >> $GITHUB_OUTPUT
            echo "deploy_path=/home/u564264509/domains/biz-connect.online/public_html" >> $GITHUB_OUTPUT
            echo "label=Production"                               >> $GITHUB_OUTPUT
          else
            echo "api_url=https://test-api.biz-connect.online/api" >> $GITHUB_OUTPUT
            echo "deploy_path=/home/u564264509/domains/biz-connect.online/public_html/test"   >> $GITHUB_OUTPUT
            echo "label=Test"                                       >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ steps.env.outputs.api_url }}
        run: yarn build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy via rsync
        run: |
          rsync -avz --progress --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ steps.env.outputs.deploy_path }}/

      - name: Write .htaccess
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DEPLOY_PATH="${{ steps.env.outputs.deploy_path }}"

            cat > "$DEPLOY_PATH/.htaccess" << 'EOF'
            <IfModule mod_rewrite.c>
                RewriteEngine On
                RewriteBase /

                RewriteCond %{HTTPS} off
                RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

                RewriteCond %{REQUEST_FILENAME} !-f
                RewriteCond %{REQUEST_FILENAME} !-d
                RewriteRule . /index.html [L]
            </IfModule>
            EOF

            echo "===== [${{ steps.env.outputs.label }}] Frontend deployed ====="
